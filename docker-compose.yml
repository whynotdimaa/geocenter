services:

  # ── Databases ────────────────────────────────────────────────────────────

  db_auth:
    image: postgres:16-alpine
    container_name: geocenter_db_auth
    environment:
      POSTGRES_DB: geocenter_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    volumes:
      - db_auth_data:/var/lib/postgresql/data
    networks:
      - geocenter_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geocenter_auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  db_geo:
    image: postgis/postgis:16-3.4-alpine
    container_name: geocenter_db_geo
    environment:
      POSTGRES_DB: geocenter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    volumes:
      - db_geo_data:/var/lib/postgresql/data
    networks:
      - geocenter_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geocenter_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geocenter_redis
    volumes:
      - redis_data:/data
    networks:
      - geocenter_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── Microservices ─────────────────────────────────────────────────────────

  auth_service:
    build: ./auth_service
    container_name: geocenter_auth
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:123@db_auth:5432/geocenter_auth
      SECRET_KEY: super-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    depends_on:
      db_auth:
        condition: service_healthy
    networks:
      - geocenter_net
    restart: unless-stopped

  locations_service:
    build: ./backend
    container_name: geocenter_locations
    environment:
      DJANGO_SECRET_KEY: super-secret-key-change-in-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,nginx,geocenter_gateway,locations_service"
      DB_NAME: geocenter_db
      DB_USER: postgres
      DB_PASSWORD: "123"
      DB_HOST: db_geo
      DB_PORT: "5432"
      AUTH_SERVICE_URL: http://auth_service:8001
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db_geo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    networks:
      - geocenter_net
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  frontend:
    build: ./frontend
    container_name: geocenter_frontend
    networks:
      - geocenter_net
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: geocenter_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/media:ro
    depends_on:
      - auth_service
      - locations_service
      - frontend
    networks:
      - geocenter_net
    restart: unless-stopped

# ── Volumes & Networks ────────────────────────────────────────────────────

volumes:
  db_auth_data:
  db_geo_data:
  media_data:
  redis_data:

networks:
  geocenter_net:
    driver: bridge