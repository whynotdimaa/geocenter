events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логування
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Timeouts
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Передаємо реальний IP клієнта в сервіси
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    upstream auth_service {
        server auth_service:8001;
    }

    upstream locations_service {
        server locations_service:8000;
    }

    upstream analytics_service {
        server analytics_service:8002;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Auth Service ── /api/auth/* → FastAPI :8001 ────────────────
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
        }

        location /api/users/ {
            proxy_pass http://auth_service/api/users/;
        }

        # ── Locations Service ── /api/locations/* → Django :8000 ───────
        location /api/locations/ {
            proxy_pass http://locations_service/api/locations/;
        }

        location /api/collections/ {
            proxy_pass http://locations_service/api/collections/;
        }

        # ── Analytics Service ── /api/analytics/* → FastAPI :8002 ──────
        location /api/analytics/ {
            proxy_pass http://analytics_service/api/analytics/;
        }

        # ── Django Admin ────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://locations_service/admin/;
        }

        # ── Django Static / Media ───────────────────────────────────────
        location /static/ {
            proxy_pass http://locations_service/static/;
        }

        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── API Docs (Swagger / ReDoc) ──────────────────────────────────
        location /api/docs/ {
            proxy_pass http://locations_service/api/docs/;
        }

        location /api/schema/ {
            proxy_pass http://locations_service/api/schema/;
        }

        # Auth Service docs
        location /auth/docs {
            proxy_pass http://auth_service/docs;
        }

        # Analytics Service docs
        location /analytics/docs {
            proxy_pass http://analytics_service/docs;
        }

        # ── Health checks ───────────────────────────────────────────────
        location /health/auth {
            proxy_pass http://auth_service/health;
        }

        location /health/analytics {
            proxy_pass http://analytics_service/health;
        }

        # ── Frontend ── все інше → React SPA ───────────────────────────
        location / {
            proxy_pass http://frontend;

            # WebSocket для Vite HMR (dev режим)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
