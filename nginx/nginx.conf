events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Вимикаємо авто-редіректи від проксі — щоб не було 307
    proxy_redirect off;

    # Docker internal DNS — re-resolves upstreams every 30s (prevents 502 after rebuilds)
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;

        # ── Auth Service ────────────────────────────────────────────────
        location /api/auth/ {
            set $auth_up "auth_service:8001";
            proxy_pass http://$auth_up;
        }

        location /api/users/ {
            set $auth_up "auth_service:8001";
            proxy_pass http://$auth_up;
        }

        # ── Locations Service ────────────────────────────────────────────
        location /api/locations/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        location /api/collections/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        # ── Analytics (Django backend) ─────────────────────────────────────
        location /api/analytics/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        # ── Django Admin ─────────────────────────────────────────────────
        location /admin/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        # ── Static / Media ───────────────────────────────────────────────
        location /static/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Docs ─────────────────────────────────────────────────────────
        location /api/docs/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        location /api/schema/ {
            set $loc_up "locations_service:8000";
            proxy_pass http://$loc_up;
        }

        location /auth/docs {
            rewrite ^/auth(/.*)?$ $1 break;
            set $auth_up "auth_service:8001";
            proxy_pass http://$auth_up;
        }

        # ── Health checks ─────────────────────────────────────────────────
        location /health/auth {
            rewrite ^/health/auth(.*)$ /health$1 break;
            set $auth_up "auth_service:8001";
            proxy_pass http://$auth_up;
        }

        # ── Frontend (React SPA) ──────────────────────────────────────────
        location / {
            set $fe_up "frontend:5173";
            proxy_pass http://$fe_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}